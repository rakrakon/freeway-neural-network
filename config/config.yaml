env:
  # The width and the height used for the observation inside the ENV
  width: 84
  height: 84
  num_lanes: 10
train:
  frame_stack: 4  # Stack 4 frames for temporal information
  frame_height: 84
  frame_width: 84
  learning_rate: 0.0003  # Standard for Atari
  gamma: 0.999  # Discount factor
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay: 1000000  # Frames to decay epsilon over
  batch_size: 32
  replay_buffer_size: 100000
  target_update_frequency: 5000  # Update target network every 5000 steps
  learning_starts: 10000  # Start learning after collecting some experience
graphics:
  # The width and the height used for the graphics display, meaning it will be the screen resolution
  width: 84
  height: 84